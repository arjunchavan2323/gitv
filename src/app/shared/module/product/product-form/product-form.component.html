


<mat-card class="mt-3">
    <form #productForm="ngForm" (ngSubmit)="onsubmit()">
        <div class="form-group">
            <label for="pName">pName</label>
            <input type="text" class="form-control" ngModel name="pName" required>
        </div>
          <div class="form-group">
            <label for="Pdetail">Pdetail</label>
            <textarea type="text" class="form-control" ngModel name="Pdetail" required rows="4"></textarea>
        </div>
        <button mat-raised-button color="primary" [disabled]="productForm.invalid" class="btn-block">Add product</button>
    </form>
</mat-card>
